<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚾ 棒球卡牌對戰</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <h1>⚾ 棒球卡牌對戰</h1>
        
        <div id="scoreboard">
            <div class="team">
                <span>客隊</span>
                <span class="score" id="away-score">0</span>
            </div>
            <div class="inning-info">
                <span id="inning">第1局</span>
                <span id="inning-half">上</span>
            </div>
            <div class="team">
                <span>主隊</span>
                <span class="score" id="home-score">0</span>
            </div>
        </div>
        
        <!-- 球場 -->
        <div id="field">
            <div id="bases-display">
                <div class="base-indicator" id="base-ind-1"></div>
                <div class="base-indicator" id="base-ind-2"></div>
                <div class="base-indicator" id="base-ind-3"></div>
            </div>
            
            <div id="bso-display">
                <div class="bso-row balls">
                    <span class="bso-label balls">B</span>
                    <div class="bso-dot"></div>
                    <div class="bso-dot"></div>
                    <div class="bso-dot"></div>
                </div>
                <div class="bso-row strikes">
                    <span class="bso-label strikes">S</span>
                    <div class="bso-dot"></div>
                    <div class="bso-dot"></div>
                </div>
                <div class="bso-row outs">
                    <span class="bso-label outs">O</span>
                    <div class="bso-dot"></div>
                    <div class="bso-dot"></div>
                </div>
            </div>
            
            <div class="base" id="base-3">三</div>
            <div class="base" id="base-2">二</div>
            <div class="base" id="base-1">一</div>
            <div class="base" id="base-home">本</div>
        </div>
        
        <!-- 對戰區 -->
        <div id="battle-area">
            <!-- 玩家出牌 -->
            <div class="player-zone">
                <h3>👤 你</h3>
                <div class="player-cards" id="player-play"></div>
            </div>
            
            <!-- 結果 -->
            <div id="result-area">
                <div id="result-display">
                    <div id="last-play">等待出牌...</div>
                    <div id="result-text"></div>
                </div>
            </div>
            
            <!-- AI 出牌 -->
            <div class="player-zone">
                <h3>🤖 AI</h3>
                <div class="player-cards" id="ai-play"></div>
            </div>
        </div>
        
        <div id="message-area">
            <div class="message">👆 點擊卡牌出牌</div>
        </div>
        
        <div id="player-hand">
            <div class="hand-label">你的手牌</div>
            <div id="hand-cards"></div>
        </div>
        
        <div id="controls">
            <button id="draw-btn">🎯 抽牌</button>
            <a href="rules.html" class="btn">📖 規則</a>
        </div>
    </div>
    
    <script src="js/cards.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
