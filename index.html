<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚾ 棒球卡牌對戰</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <h1>⚾ 棒球卡牌對戰</h1>
        
        <div id="scoreboard">
            <div class="team" id="team-away">
                <span>客隊</span>
                <span class="score" id="away-score">0</span>
            </div>
            <div class="inning-info">
                <span id="inning">第1局</span>
                <span id="inning-half">上</span>
            </div>
            <div class="team" id="team-home">
                <span>主隊</span>
                <span class="score" id="home-score">0</span>
            </div>
        </div>
        
        <!-- 棒球場 -->
        <div id="field">
            <div class="base" id="base-3">三</div>
            <div class="base" id="base-2">二</div>
            <div class="base" id="base-1">一</div>
            <div class="base" id="base-home">本</div>
            
            <!-- 球數顯示在中央 -->
            <div id="count-display">
                <div class="count-section count-balls">
                    <span class="count-label">壞球</span>
                    <div class="count-dots" id="balls-dots">
                        <div class="dot balls"></div>
                        <div class="dot balls"></div>
                        <div class="dot balls"></div>
                        <div class="dot balls"></div>
                    </div>
                </div>
                <div class="count-section count-strikes">
                    <span class="count-label">好球</span>
                    <div class="count-dots" id="strikes-dots">
                        <div class="dot strikes"></div>
                        <div class="dot strikes"></div>
                        <div class="dot strikes"></div>
                    </div>
                </div>
                <div class="count-section count-outs">
                    <span class="count-label">出局</span>
                    <div class="count-dots" id="outs-dots">
                        <div class="dot outs"></div>
                        <div class="dot outs"></div>
                        <div class="dot outs"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="message-area"></div>
        
        <div id="player-hand">
            <div class="hand-label">👆 點擊卡牌出牌</div>
            <div id="hand-cards"></div>
        </div>
        
        <div id="controls">
            <button id="draw-btn">🎯 抽牌</button>
        </div>
    </div>
    
    <script src="js/cards.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
